<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>162981 - Razan Mustafa Abdullah</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body> 

<nav class="navbar">
    <div class="nav-container">
        <span class="logo">MyPortfolio</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="contact.html" class="active">Contact Me</a>
        </div>
    </div>
</nav>

<main class="container">
    <section class="card">
        <h2>Get In Touch</h2>
        <p>Please fill out the form below to contact me, All fields are required.</p>
        
        <form id="contactForm" class="modern-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@domain.com">
            </div>

            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" placeholder="Your country">
            </div>

            <div class="form-group">
                <label for="comments">Comments</label>
                <textarea id="comments" rows="5" placeholder="Write your message here..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
